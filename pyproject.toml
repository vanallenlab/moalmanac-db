line-length = 88

[format]
quote-style = "double"
indent-style = "space"

[lint]
fixable = ["ALL"]
ignore = []
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-native rules
]
